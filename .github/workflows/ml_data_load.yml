name: Daily ML Data Pipeline

on:
  schedule:
    # KST 기준 매일 아침 9시 (UTC 기준 00:00)
    - cron: '0 0 * * *'
  
  # GitHub 페이지에서 수동으로 실행 버튼을 누를 수 있도록 허용
  workflow_dispatch: 

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 저장소의 코드를 가상 환경으로 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance python-dotenv sqlalchemy pymysql cryptography

      - name: Run Data Pipeline Scripts
        env:
          # GitHub Secrets에 등록된 값들을 환경 변수로 불러옵니다. (.env 역할)
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          REB_API_KEY: ${{ secrets.REB_API_KEY }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          echo "🚀 [1/3] 원시 데이터 수집 시작..."
          python utils/ml/collect_rawdata.py
          
          echo "🚀 [2/3] 데이터 병합 시작..."
          python utils/ml/concat_rawdata.py
          
          echo "🚀 [3/3] DB 적재 시작..."
          python utils/ml/load_data.py